# Nginx configuration pentru misedainspectsrl.ro
# Salvați acest fișier ca: /etc/nginx/sites-available/misedainspectsrl.ro
# Apoi: sudo ln -s /etc/nginx/sites-available/misedainspectsrl.ro /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name misedainspectsrl.ro www.misedainspectsrl.ro;
    
    # Redirect la HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name misedainspectsrl.ro www.misedainspectsrl.ro;

    # SSL Configuration (obținut de la Let's Encrypt sau alt CA)
    ssl_certificate /path/to/ssl/certificate.crt;
    ssl_certificate_key /path/to/ssl/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Root directory pentru React build
    root /var/www/misedainspectsrl.ro/client/build;
    index index.html index.htm;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private must-revalidate auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # API routes - proxy la Node.js backend
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Static files cu cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router - toate route-urile care nu sunt API sau fișiere statice
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache pentru HTML
        add_header Cache-Control "no-cache";
    }

    # Upload files (dacă aveți upload functionality)
    location /uploads/ {
        alias /var/www/misedainspectsrl.ro/server/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Logs
    access_log /var/log/nginx/misedainspectsrl.ro.access.log;
    error_log /var/log/nginx/misedainspectsrl.ro.error.log;

    # Limitare dimensiune upload
    client_max_body_size 10M;
}

# Rate limiting pentru API
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Aplicare rate limiting
location /api/users/forgot-password {
    limit_req zone=api_limit burst=3 nodelay;
    proxy_pass http://localhost:5000;
    # ... rest of proxy settings
}
